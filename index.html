<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Edu Pro</title>
    <link rel="icon" type="image/png" href="C:\Users\andre\Downloads\ANDREWPROJECT0319\Andrew (6).png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: "#050B14", panel: "#0F172A" },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050B14; color: #F8FAFC; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                user: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />,
                lock: <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />,
                cpu: <><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></>,
                brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" />,
                play: <polygon points="5 3 19 12 5 21 5 3" />,
                map: <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" />,
                wind: <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" />,
                barChart: <><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>,
                fan: <path d="M10.8 16.38a6.08 6.08 0 0 1-8.61-7l5.4 1.45a6.08 6.08 0 0 1 7-8.62l-1.45 5.41a6.08 6.08 0 0 1 8.62 7l-5.41-1.45a6.08 6.08 0 0 1-7 8.62l1.45-5.41Z" />,
                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

//login
        const LoginView = ({ onLogin }) => {
            const [id, setId] = useState("");
            const [name, setName] = useState("");

            return (
                <div className="relative w-full h-screen flex items-center justify-center bg-dark">
                    <div className="absolute w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[200px] animate-pulse-slow top-0 left-10"></div>
                    <div className="absolute w-[400px] h-[400px] bg-purple-600/20 rounded-full blur-[200px] animate-pulse-slow bottom-0 right-10" style={{animationDelay: '1s'}}></div>
                    <div className="z-10 bg-white/5 backdrop-blur-xl border border-white/10 p-12 rounded-[100px] w-[450px] shadow-2xl animate-float">
                        <div className="text-center mb-10">
                            <h1 className="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">EDU ALGO AIOT</h1>
                            <p className="text-slate-400 font-bold tracking-widest text-xs">EDUCATION SYSTEM PRO</p>
                            <p className="text-slate-400 font-bold tracking-widest text-xs">指導教授:郭家旭 教授</p>
                            <p className="text-slate-400 font-bold tracking-widest text-xs">專題生:蔡曜丞</p>
                            <p className="text-slate-400 font-bold tracking-widest text-xs">version 1.0</p>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="text-xs font-bold text-blue-400 uppercase ml-2">Student ID</label>
                                <input type="text" value={id} onChange={e=>setId(e.target.value)} placeholder="請輸入您的學號" className="mt-2 w-full bg-black/40 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500 font-mono" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-purple-400 uppercase ml-2">Full Name</label>
                                <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="請輸入您的姓名" className="mt-2 w-full bg-black/40 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-purple-500" />
                            </div>
                            
                            <button
                                onClick={async () => {
                                    try {
                                        const res = await fetch('http://localhost:3001/login', {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ id: id, name: name }) // 傳送學號和姓名
                                        });
                                        
                                        const data = await res.json();

                                        if(res.ok){
                                            // 登入成功，將資料庫回傳的 user 資料傳給上層
                                            onLogin({ id: data.user.id, name: data.user.name });
                                        } else {
                                            // 顯示資料庫回傳的錯誤訊息 (如：學號不正確)
                                            alert(data.message);
                                        }
                                    } catch(e) {
                                        alert('無法連線到後端伺服器，請檢查 server.js 是否有執行');
                                    }
                                }}
                                className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-2xl mt-8 transition-transform hover:scale-105"
                                >
                                LOGIN SYSTEM ➜
                                </button>
                        </div>
                    </div>
                </div>
            );
        };

        //SEL
        const SELOnboarding = ({ user, onComplete }) => {
            const [step, setStep] = useState(0);
            const [mood, setMood] = useState(null);

            const moods = [
                { label: "準備戰鬥", icon: "🔥", color: "text-red-300", border: "hover:border-red-500" },
                { label: "能量滿滿", icon: "🚀", color: "text-green-300", border: "hover:border-green-500" },
                { label: "平靜專注", icon: "🧘", color: "text-blue-300", border: "hover:border-blue-500" },
                { label: "思緒混亂", icon: "🤯", color: "text-yellow-300", border: "hover:border-yellow-500" },
                { label: "疲憊低落", icon: "🔋", color: "text-purple-300", border: "hover:border-purple-500" },
            ];

            if (step === 0) return (
                <div className="flex flex-col items-center justify-center h-screen bg-dark">
                    <h2 className="text-4xl font-bold mb-4">歡迎回來, {user.name}</h2>
                    <p className="text-slate-400 mb-12 text-xl">AI 助教想知道，今天學習引擎的參數是？</p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-4xl w-full px-8">
                        {moods.map((m, idx) => (
                            <button key={idx} onClick={() => { setMood(m); setStep(1); }} className={`p-10 rounded-[2rem] border border-slate-700 bg-panel/50 backdrop-blur-sm flex flex-col items-center gap-6 transition-all transform hover:-translate-y-2 ${m.border} group`}>
                                <span className="text-6xl group-hover:scale-110 transition-transform">{m.icon}</span>
                                <span className={`font-bold text-xl ${m.color}`}>{m.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (step === 1) return (
                <div className="flex flex-col items-center justify-center h-screen bg-dark">
                    <h3 className="text-3xl font-bold text-blue-400 mb-2">SEL 自我調節：呼吸共振</h3>
                    <p className="text-slate-400 mb-16">請跟隨圓圈的節奏進行深呼吸</p>
                    <div className="relative w-64 h-64 flex items-center justify-center mb-16">
                        <div className="absolute inset-0 bg-blue-500/20 rounded-full blur-[40px] animate-[pulse_4s_infinite]"></div>
                        <div className="w-48 h-48 bg-gradient-to-b from-blue-400 to-indigo-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(59,130,246,0.6)] z-10 animate-[bounce_4s_infinite]">
                            <span className="text-2xl font-bold text-white">In / Out</span>
                        </div>
                    </div>
                    <button onClick={() => setStep(2)} className="px-10 py-4 rounded-full border border-slate-500 hover:bg-slate-800 text-white font-bold text-lg transition-all">狀態已調整，下一步 ➜</button>
                </div>
            );

            return (
                <div className="flex flex-col items-center justify-center h-screen bg-dark p-8 text-center">
                    <h2 className="text-3xl font-bold mb-6 text-purple-400">自我覺察 (Self-Awareness)</h2>
                    <p className="mb-10 text-xl text-slate-400">寫下一句鼓勵自己的話，設定今天的學習意圖。</p>
                    <input type="text" placeholder="例如：雖然演算法很難，但我會嘗試理解它..." className="w-full max-w-2xl bg-transparent border-b-2 border-slate-600 focus:border-purple-500 outline-none text-2xl py-4 text-center text-white mb-16 transition-colors" />
                    <button onClick={() => onComplete(mood)} className="px-12 py-5 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl font-bold text-2xl shadow-lg hover:scale-105 transition-transform">
                        進入學習儀表板
                    </button>
                </div>
            );
        };

        // MAP
        const CityMap = ({ onSelect }) => {
            const cities = [
                { id: 'iot', name: '綠色科技城', sub: 'IoT 虛擬實驗室', icon: 'wind', color: 'text-emerald-400', locked: false },
                { id: 'algo', name: '數位素養城', sub: '演算法視覺化', icon: 'brain', color: 'text-purple-400', locked: false },
                { id: 'social', name: '社會價值城', sub: '科技倫理探討', icon: 'user', color: 'text-amber-400', locked: false },
                { id: 'culture', name: '文化理解城', sub: '性別議題融入', icon: 'heart', color: 'text-red-400', locked: false },
                { id: 'personal', name: '個人成長城', sub: '乖乖長大', icon: 'star', color: 'text-blue-400', locked: false },
            ];

            return (
                <div className="p-10 h-full overflow-y-auto">
                    <div className="mb-10">
                        <h1 className="text-4xl font-black mb-2">MISSION MAP</h1>
                        <p className="text-slate-400">選擇一座城市開始您的學習旅程</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {cities.map(city => (
                            <div key={city.name} onClick={() => !city.locked && onSelect(city.id)} className={`p-8 rounded-[2rem] border border-slate-700 bg-panel/80 relative group transition-all duration-300 ${city.locked ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:-translate-y-2 hover:border-slate-500 shadow-xl'}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div className={`p-4 rounded-2xl bg-slate-800 ${city.color}`}><Icon name={city.icon} size={32}/></div>
                                    {city.locked && <Icon name="lock" className="text-slate-500"/>}
                                </div>
                                <h3 className="text-2xl font-bold mb-1">{city.name}</h3>
                                <p className="text-slate-400 text-sm font-mono tracking-wider mb-8">{city.sub}</p>
                                {!city.locked && <div className="text-sm font-bold text-white/50 group-hover:text-white transition-colors">START MISSION ➜</div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // IOT
        const IoTLab = () => {
            const [data, setData] = useState(Array(30).fill(25));
            const [fan, setFan] = useState(false);
            const [logs, setLogs] = useState(["[SYSTEM] Sensor connected..."]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setData(prev => {
                        const base = fan ? 24 : 32;
                        const temp = base + Math.random() * 4 - 2;
                        const newData = [...prev.slice(1), temp];
                        
                        if(temp > 30 && !fan) setLogs(l => [`[WARN] Temp ${temp.toFixed(1)}°C > 30. Fan ON.`, ...l.slice(0,4)]);
                        
                        return newData;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [fan]);

            // 計算 SVG 曲線路徑
            const generatePath = () => {
                const max = 40, min = 20;
                const dx = 100 / (data.length - 1);
                return data.map((d, i) => {
                    const x = i * dx;
                    const y = 100 - ((d - min) / (max - min)) * 100;
                    return `${x},${y}`;
                }).join(' L ');
            };

            return (
                <div className="h-full p-6 flex flex-col gap-6">
                    <header>
                        <h2 className="text-3xl font-bold flex items-center gap-3 text-emerald-400"><Icon name="cpu" size={32}/> 綠色科技城：智慧溫室</h2>
                        <p className="text-emerald-500/70 font-mono text-sm tracking-widest pl-11">LIVE DATA STREAMING</p>
                    </header>

                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* 左：動態波形圖 (純 SVG) */}
                        <div className="lg:col-span-2 bg-panel border border-slate-700 rounded-3xl p-6 relative flex flex-col">
                            <h3 className="text-slate-400 font-bold mb-4">Analog Signal (Temp °C)</h3>
                            <div className="flex-1 relative w-full h-full border-l border-b border-slate-600">
                                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute bottom-0">
                                    {/* 漸層填色 */}
                                    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stopColor="#10b981" stopOpacity="0.4"/>
                                        <stop offset="100%" stopColor="#10b981" stopOpacity="0"/>
                                    </linearGradient>
                                    <polygon points={`0,100 ${generatePath().replace(/L/g, '')} 100,100`} fill="url(#grad)" />
                                    {/* 曲線 */}
                                    <path d={`M ${generatePath()}`} fill="none" stroke="#10b981" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                                </svg>
                            </div>
                        </div>

                        {/* 右：控制與數值 */}
                        <div className="flex flex-col gap-4">
                            <div className="bg-panel border border-slate-700 p-8 rounded-3xl flex-1 flex flex-col justify-center items-center">
                                <div className="text-slate-400 text-sm font-bold uppercase tracking-wider mb-2">Current Temp</div>
                                <div className="text-6xl font-black text-white">{data[data.length-1].toFixed(1)}<span className="text-2xl text-emerald-400 ml-1">°C</span></div>
                            </div>

                            <div className="bg-panel border border-slate-700 p-6 rounded-3xl h-40 flex items-center justify-between">
                                <div>
                                    <div className="text-slate-400 text-xs font-bold uppercase mb-1">Fan Control</div>
                                    <div className={`font-bold text-xl ${fan ? 'text-emerald-400' : 'text-slate-500'}`}>{fan ? 'RUNNING' : 'STANDBY'}</div>
                                </div>
                                <button onClick={() => setFan(!fan)} className={`w-20 h-20 rounded-2xl flex items-center justify-center transition-all ${fan ? 'bg-emerald-500 text-black shadow-[0_0_20px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-slate-400'}`}>
                                    <div className={fan ? 'animate-[spin_1s_linear_infinite]' : ''}><Icon name="fan" size={40} /></div>
                                </button>
                            </div>

                            <div className="flex-1 bg-black rounded-3xl p-5 font-mono text-xs text-emerald-500 border border-slate-800">
                                <div className="opacity-50 mb-3 border-b border-slate-800 pb-2">SERIAL MONITOR</div>
                                {logs.map((l, i) => <div key={i} className="mb-1.5">{l}</div>)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        //ALGO
        const AlgoLab = () => {
            const [arr, setArr] = useState([50, 80, 30, 90, 20, 60]);
            const [active, setActive] = useState([]);
            const [msg, setMsg] = useState("點擊播放開始排序演示");
            const [sorting, setSorting] = useState(false);

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            const runSort = async () => {
                setSorting(true);
                let a = [...arr];
                for(let i=0; i<a.length; i++) {
                    for(let j=0; j<a.length-i-1; j++) {
                        setActive([j, j+1]);
                        setMsg(`比較: ${a[j]} 與 ${a[j+1]}`);
                        await sleep(600);
                        if(a[j] > a[j+1]) {
                            setMsg(`交換！ ${a[j]} > ${a[j+1]}`);
                            [a[j], a[j+1]] = [a[j+1], a[j]];
                            setArr([...a]);
                            await sleep(600);
                        }
                    }
                }
                setActive([]);
                setMsg("✅ 排序完成！時間複雜度 O(n²)");
                setSorting(false);
            };

            return (
                <div className="h-full flex flex-col items-center justify-center p-10">
                    <div className="text-center mb-16">
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-sm font-bold mb-4">
                            <Icon name="brain" size={16}/> ALGORITHM VISUALIZER
                        </div>
                        <h2 className="text-4xl font-bold mb-4">Bubble Sort 泡沫排序</h2>
                        <div className="bg-slate-800 px-6 py-3 rounded-xl border border-slate-700 text-lg font-mono text-yellow-400 shadow-lg">
                            🤖 AI: {msg}
                        </div>
                    </div>

                    <div className="flex items-end gap-6 h-64 mb-16">
                        {arr.map((val, i) => (
                            <div key={i} className="flex flex-col items-center gap-3 transition-all duration-300">
                                <span className={`text-xl font-bold font-mono ${active.includes(i) ? 'text-white' : 'text-slate-500'}`}>{val}</span>
                                <div 
                                    className={`w-20 rounded-t-2xl transition-all duration-300 ${active.includes(i) ? 'bg-yellow-400 shadow-[0_0_30px_rgba(250,204,21,0.5)] -translate-y-4' : 'bg-purple-600'}`}
                                    style={{ height: `${val * 3}px` }}
                                ></div>
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-4">
                        <button onClick={runSort} disabled={sorting} className="px-10 py-4 bg-purple-600 hover:bg-purple-500 disabled:bg-slate-800 rounded-2xl font-bold text-xl flex items-center gap-3 transition-colors">
                            <Icon name="play" /> {sorting ? '演示中...' : '開始演示'}
                        </button>
                        <button onClick={() => {setArr([...arr].sort(()=>Math.random()-0.5)); setMsg("資料已重置");}} disabled={sorting} className="p-4 bg-panel border border-slate-700 hover:bg-slate-800 rounded-2xl transition-colors">
                            <Icon name="rotate" />
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🚀 7. 主程式框架 (App)
        // ==========================================
        const App = () => {
            const [view, setView] = useState('login');
            const [module, setModule] = useState(null);
            const [user, setUser] = useState({ id: '', name: '', mood: null });

            const handleLogin = (u) => { setUser(u); setView('sel'); };
            const handleSEL = (m) => { setUser(p => ({...p, mood: m})); setView('dash'); };

            if (view === 'login') return <LoginView onLogin={handleLogin} />;
            if (view === 'sel') return <SELOnboarding user={user} onComplete={handleSEL} />;

            return (
                <div className="flex h-screen bg-dark">
                    {/* 左側 Sidebar */}
                    <aside className="w-72 bg-panel border-r border-slate-800 flex flex-col p-6 z-20 shadow-2xl">
                        <div className="flex items-center gap-4 mb-10">
                            <div className="w-12 h-12 bg-gradient-to-tr from-blue-600 to-emerald-500 rounded-xl flex items-center justify-center font-black text-white shadow-lg">NKNU</div>
                            <div>
                                <div className="font-black text-xl tracking-tight">EDU TECH</div>
                                <div className="text-[10px] text-slate-500 font-bold tracking-widest mt-0.5">EDUCATION PRO</div>
                            </div>
                        </div>

                        <div className="p-4 bg-slate-900/50 rounded-2xl border border-slate-800 mb-8">
                            <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Student</div>
                            <div className="font-bold text-lg">{user.name || 'Student'}</div>
                            <div className="text-xs text-emerald-400 mt-2 font-mono">● {user.mood?.label || 'Online'}</div>
                        </div>

                        <nav className="space-y-2 flex-1">
                            <button onClick={() => setModule(null)} className={`w-full p-4 rounded-xl flex items-center gap-3 transition-colors font-bold ${!module ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="map" size={20}/> 城市冒險地圖【主選單】
                            </button>
                            <div className="pt-6 pb-2 pl-4 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Labs</div>
                            <button onClick={() => setModule('iot')} className={`w-full p-4 rounded-xl flex items-center gap-3 transition-colors font-bold ${module==='iot' ? 'bg-slate-800 text-emerald-400 border border-emerald-900/50' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="wind" size={20}/> 綠色科技城
                            </button>
