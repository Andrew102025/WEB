<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKNU AIOT Education System Pro</title>
    
    <!-- 引入必要的 CDN 套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Recharts 用於 IoT 波形圖 -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Tailwind 自訂設定 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: "#050B14",
                        panel: "#0F172A",
                        primary: "#3B82F6",
                        accent: "#10B981"
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #050B14; 
            color: #F8FAFC; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden; /* 防止滾動條破壞版面 */
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = window.Recharts;

        // --- 共用圖標元件 (SVG) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                user: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />,
                lock: <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />,
                cpu: <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />,
                brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" />,
                play: <polygon points="5 3 19 12 5 21 5 3" />,
                map: <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" />,
                wind: <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" />,
                barChart: <line x1="12" y1="20" x2="12" y2="10" />,
                fan: <path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- 1. 登入介面 (Login) ---
        const LoginView = ({ onLogin }) => {
            const [id, setId] = useState("");
            const [name, setName] = useState("");

            const handleLogin = () => {
                if (id && name) onLogin({ id, name });
                else alert("請輸入學號與姓名！");
            };

            return (
                <div className="relative w-full h-screen flex items-center justify-center overflow-hidden bg-dark">
                    {/* 極光背景 */}
                    <div className="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[120px] animate-pulse-slow"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/20 rounded-full blur-[100px] animate-pulse-slow" style={{animationDelay: '2s'}}></div>
                    
                    {/* 玻璃擬態卡片 */}
                    <div className="z-10 bg-white/5 backdrop-blur-xl border border-white/10 p-12 rounded-[40px] w-full max-w-md shadow-2xl relative overflow-hidden animate-float">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-green-500"></div>
                        
                        <div className="text-center mb-10">
                            <h1 className="text-5xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">NKNU AIOT</h1>
                            <p className="text-slate-400 font-medium tracking-widest text-sm">EDUCATION SYSTEM PRO</p>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="text-xs font-bold text-blue-400 uppercase tracking-wider ml-2">Student ID</label>
                                <input type="text" value={id} onChange={e=>setId(e.target.value)} placeholder="請輸入學號" className="mt-2 w-full bg-black/30 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500 transition-colors font-mono" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-purple-400 uppercase tracking-wider ml-2">Full Name</label>
                                <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="請輸入姓名" className="mt-2 w-full bg-black/30 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-purple-500 transition-colors" />
                            </div>
                            
                            <button onClick={handleLogin} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg mt-8 transition-transform transform hover:scale-[1.02] active:scale-95">
                                LOGIN SYSTEM ➜
                            </button>
                        </div>
                        
                        <div className="mt-8 text-center opacity-50 text-xs font-mono">v5.0 Ultimate Edition</div>
                    </div>
                </div>
            );
        };

        // --- 2. 情緒登機門 (SEL Onboarding) ---
        const SELOnboarding = ({ user, onComplete }) => {
            const [step, setStep] = useState(0);
            const [mood, setMood] = useState(null);

            const moods = [
                { label: "能量滿滿", icon: "🚀", color: "text-green-400", bg: "hover:bg-green-500/20 border-green-500/30" },
                { label: "平靜專注", icon: "🧘", color: "text-blue-400", bg: "hover:bg-blue-500/20 border-blue-500/30" },
                { label: "思緒混亂", icon: "🤯", color: "text-yellow-400", bg: "hover:bg-yellow-500/20 border-yellow-500/30" },
                { label: "疲憊低落", icon: "🔋", color: "text-purple-400", bg: "hover:bg-purple-500/20 border-purple-500/30" },
            ];

            if (step === 0) return (
                <div className="flex flex-col items-center justify-center h-screen bg-dark p-8">
                    <h2 className="text-4xl font-bold mb-4 text-white">歡迎回來, {user.name}</h2>
                    <p className="text-slate-400 mb-12 text-xl">AI 助教想知道，為您的學習引擎設定什麼參數？</p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-4xl w-full">
                        {moods.map((m, idx) => (
                            <button key={idx} onClick={() => { setMood(m); setStep(1); }} className={`p-10 rounded-[2rem] border bg-panel/50 backdrop-blur-sm flex flex-col items-center justify-center gap-6 transition-all duration-300 transform hover:-translate-y-2 ${m.bg} group`}>
                                <span className="text-6xl group-hover:scale-110 transition-transform drop-shadow-2xl">{m.icon}</span>
                                <span className={`font-bold text-xl ${m.color}`}>{m.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (step === 1) return (
                <div className="flex flex-col items-center justify-center h-screen bg-dark">
                    <h3 className="text-3xl font-bold text-blue-400 mb-2">SEL 自我調節：呼吸共振</h3>
                    <p className="text-slate-400 mb-16">請跟隨圓圈的節奏進行深呼吸</p>
                    
                    <div className="relative w-64 h-64 flex items-center justify-center mb-16">
                        <div className="absolute inset-0 bg-blue-500/20 rounded-full blur-[40px] animate-pulse-slow"></div>
                        <div className="w-48 h-48 bg-gradient-to-b from-blue-400 to-indigo-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(59,130,246,0.6)] z-10 transition-transform duration-[4000ms] animate-bounce">
                            <span className="text-2xl font-bold text-white">In / Out</span>
                        </div>
                    </div>
                    
                    <button onClick={() => setStep(2)} className="px-10 py-4 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold text-lg transition-all">
                        狀態已調整，下一步 ➜
                    </button>
                </div>
            );

            return (
                <div className="flex flex-col items-center justify-center h-screen bg-dark p-8 text-center">
                    <h2 className="text-3xl font-bold mb-6 text-purple-400">自我覺察 (Self-Awareness)</h2>
                    <p className="mb-10 text-xl text-slate-400">寫下一句鼓勵自己的話，設定今天的學習意圖。</p>
                    <input type="text" placeholder="例如：雖然演算法很難，但我會嘗試理解它..." className="w-full max-w-2xl bg-transparent border-b-2 border-slate-600 focus:border-purple-500 outline-none text-2xl py-4 text-center text-white mb-16 transition-colors" />
                    <button onClick={() => onComplete(mood)} className="px-12 py-5 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 rounded-2xl font-bold text-2xl text-white shadow-lg transition-transform hover:scale-105">
                        進入學習儀表板
                    </button>
                </div>
            );
        };

        // --- 3. 城市地圖 (City Map) ---
        const CityMap = ({ onSelect }) => {
            const cities = [
                { id: 'iot', name: '綠色科技城', sub: 'IoT 虛擬實驗室', icon: 'wind', color: 'text-emerald-400', border: 'hover:border-emerald-500/50', locked: false },
                { id: 'algo', name: '數位素養城', sub: '演算法視覺化', icon: 'brain', color: 'text-purple-400', border: 'hover:border-purple-500/50', locked: false },
                { id: 'social', name: '社會價值城', sub: '科技倫理探討', icon: 'user', color: 'text-amber-400', border: '', locked: true },
            ];

            return (
                <div className="p-10 h-full overflow-y-auto animate-in fade-in duration-500">
                    <div className="mb-10">
                        <h1 className="text-4xl font-black text-white mb-2">MISSION MAP</h1>
                        <p className="text-slate-400">選擇一座城市開始您的學習旅程</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {cities.map(city => (
                            <div key={city.name} onClick={() => !city.locked && onSelect(city.id)} className={`p-8 rounded-[2rem] border border-white/5 bg-panel/50 backdrop-blur-md relative overflow-hidden group transition-all duration-300 ${city.locked ? 'opacity-50 grayscale cursor-not-allowed' : `cursor-pointer hover:-translate-y-2 hover:shadow-2xl hover:bg-panel ${city.border}`}`}>
                                <div className={`absolute top-0 right-0 w-48 h-48 rounded-full blur-[60px] -mr-10 -mt-10 opacity-20 group-hover:opacity-40 transition-opacity bg-current ${city.color}`}></div>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className={`p-4 rounded-2xl bg-white/5 ${city.color}`}><Icon name={city.icon} size={32}/></div>
                                        {city.locked && <Icon name="lock" className="text-slate-500"/>}
                                    </div>
                                    <h3 className="text-2xl font-bold text-white mb-1">{city.name}</h3>
                                    <p className="text-slate-400 text-sm font-mono tracking-wider mb-8">{city.sub}</p>
                                    {!city.locked && <div className="text-sm font-bold text-white/50 group-hover:text-white transition-colors">START MISSION ➜</div>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 4. IoT 實驗室 (IoT Lab) ---
        const IoTLab = () => {
            const [data, setData] = useState([]);
            const [fan, setFan] = useState(false);
            const [logs, setLogs] = useState(["[SYSTEM] Sensor connected..."]);

            useEffect(() => {
                const i = setInterval(() => {
                    setData(prev => {
                        const now = new Date().toLocaleTimeString('en-US', {hour12:false});
                        const base = fan ? 24 : 32;
                        const temp = base + Math.random() * 4 - 2; // 加入雜訊
                        const newData = [...prev, { time: now, temp: temp }];
                        if (newData.length > 20) newData.shift();
                        
                        // 自動警報邏輯
                        if(temp > 30 && !fan) setLogs(l => [`[WARN] Temp ${temp.toFixed(1)}°C > 30. Auto-Cooling.`, ...l.slice(0,4)]);
                        
                        return newData;
                    });
                }, 1000);
                return () => clearInterval(i);
            }, [fan]);

            return (
                <div className="h-full p-6 flex flex-col gap-6 animate-in fade-in duration-500">
                    <header className="flex justify-between items-end">
                        <div>
                            <h2 className="text-3xl font-bold text-white flex items-center gap-3">
                                <Icon name="cpu" className="text-emerald-400" size={32}/> 數位雙生監控室
                            </h2>
                            <p className="text-emerald-500/70 font-mono text-sm tracking-widest pl-11 mt-1">LIVE DATA STREAMING</p>
                        </div>
                    </header>

                    <div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* 圖表區 (Recharts) */}
                        <div className="lg:col-span-2 bg-panel border border-slate-800 rounded-3xl p-6 relative">
                            <h3 className="text-slate-400 font-bold mb-4">Analog Signal (Temp)</h3>
                            <ResponsiveContainer width="100%" height="85%">
                                <AreaChart data={data}>
                                    <defs>
                                        <linearGradient id="colorTemp" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="5%" stopColor="#10b981" stopOpacity={0.5}/>
                                            <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                                        </linearGradient>
                                    </defs>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" vertical={false} />
                                    <XAxis dataKey="time" stroke="#475569" fontSize={12} tickLine={false} />
                                    <YAxis domain={[20, 40]} stroke="#475569" fontSize={12} tickLine={false} />
                                    <Tooltip contentStyle={{backgroundColor: '#0F172A', border: '1px solid #1E293B', borderRadius: '8px'}} />
                                    <Area type="monotone" dataKey="temp" stroke="#10b981" strokeWidth={3} fillOpacity={1} fill="url(#colorTemp)" isAnimationActive={false} />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        {/* 控制區 */}
                        <div className="flex flex-col gap-4">
                            <div className="bg-panel border border-slate-800 p-8 rounded-3xl flex-1 flex flex-col justify-center items-center">
                                <div className="text-slate-400 text-sm font-bold uppercase tracking-wider mb-2">Current Temp</div>
                                <div className="text-6xl font-black text-white">
                                    {data.length ? data[data.length-1].temp.toFixed(1) : '--'}
                                    <span className="text-2xl text-emerald-400 align-top ml-1">°C</span>
                                </div>
                            </div>

                            <div className="bg-panel border border-slate-800 p-6 rounded-3xl h-40 flex items-center justify-between">
                                <div>
                                    <div className="text-slate-400 text-xs font-bold uppercase mb-1">Fan Control</div>
                                    <div className={`font-bold text-xl ${fan ? 'text-emerald-400' : 'text-slate-500'}`}>{fan ? 'RUNNING' : 'STANDBY'}</div>
                                </div>
                                <button onClick={() => setFan(!fan)} className={`w-20 h-20 rounded-2xl flex items-center justify-center transition-all duration-300 ${fan ? 'bg-emerald-500 text-black shadow-[0_0_30px_rgba(16,185,129,0.4)]' : 'bg-slate-800 text-slate-500 hover:bg-slate-700'}`}>
                                    <Icon name="fan" size={40} className={fan ? 'animate-[spin_1s_linear_infinite]' : ''} />
                                </button>
                            </div>

                            <div className="flex-1 bg-[#020617] rounded-3xl p-5 font-mono text-xs text-emerald-500 border border-slate-800 overflow-hidden">
                                <div className="opacity-50 mb-3 border-b border-slate-800 pb-2">SERIAL MONITOR (COM3)</div>
                                {logs.map((l, i) => <div key={i} className="mb-1.5">{l}</div>)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 5. 演算法實驗室 (Algo Lab) ---
        const AlgoLab = () => {
            const [arr, setArr] = useState([50, 80, 30, 90, 20, 60]);
            const [active, setActive] = useState([]);
            const [msg, setMsg] = useState("準備就緒。點擊播放開始演示。");
            const [sorting, setSorting] = useState(false);

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            const runSort = async () => {
                setSorting(true);
                let a = [...arr];
                for(let i=0; i<a.length; i++) {
                    for(let j=0; j<a.length-i-1; j++) {
                        setActive([j, j+1]);
                        setMsg(`比較: ${a[j]} 與 ${a[j+1]}`);
                        await sleep(800);
                        if(a[j] > a[j+1]) {
                            setMsg(`順序錯誤，交換 ${a[j]} 與 ${a[j+1]}`);
                            [a[j], a[j+1]] = [a[j+1], a[j]];
                            setArr([...a]);
                            await sleep(800);
                        }
                    }
                }
                setActive([]);
                setMsg("排序完成！時間複雜度 O(n²)");
                setSorting(false);
            };

            return (
                <div className="h-full flex flex-col items-center justify-center p-10 relative animate-in fade-in duration-500">
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(139,92,246,0.1)_0,transparent_100%)] pointer-events-none"></div>
                    
                    <div className="text-center mb-16 z-10">
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-sm font-bold mb-4">
                            <Icon name="brain" size={16}/> ALGORITHM VISUALIZER
                        </div>
                        <h2 className="text-4xl font-bold text-white mb-4">Bubble Sort 泡沫排序</h2>
                        <div className="bg-slate-800/80 px-6 py-3 rounded-xl border border-slate-700 text-lg font-mono text-yellow-400 max-w-xl mx-auto shadow-lg">
                            🤖 AI: {msg}
                        </div>
                    </div>

                    <div className="flex items-end gap-6 h-64 z-10 px-10 mb-16">
                        {arr.map((val, i) => (
                            <div key={i} className="flex flex-col items-center gap-3 transition-all duration-500">
                                <span className={`text-xl font-bold font-mono transition-colors ${active.includes(i) ? 'text-white' : 'text-slate-500'}`}>{val}</span>
                                <div 
                                    className={`w-20 rounded-t-2xl relative transition-all duration-300 ${active.includes(i) ? 'bg-yellow-400 shadow-[0_0_40px_rgba(250,204,21,0.6)] -translate-y-4' : 'bg-purple-600/80'}`}
                                    style={{ height: `${val * 3}px` }}
                                ></div>
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-4 z-10">
                        <button onClick={runSort} disabled={sorting} className="px-10 py-4 bg-purple-600 hover:bg-purple-500 disabled:bg-slate-800 text-white rounded-2xl font-bold text-xl shadow-lg shadow-purple-900/40 transition-all flex items-center gap-3">
                            <Icon name="play" /> 開始演示
                        </button>
                        <button onClick={() => {setArr([50, 80, 30, 90, 20, 60].sort(()=>Math.random()-0.5)); setMsg("資料已重置");}} disabled={sorting} className="p-4 bg-panel border border-slate-700 hover:bg-slate-800 text-white rounded-2xl transition-all">
                            <Icon name="rotate" />
                        </button>
                    </div>
                </div>
            );
        };

        // --- 主程式架構 (Main App Layout) ---
        const App = () => {
            const [view, setView] = useState('login'); // login | sel | dash
            const [user, setUser] = useState({ id: '', name: '', mood: null });
            const [module, setModule] = useState(null); // null | iot | algo

            const handleLogin = (u) => { setUser(u); setView('sel'); };
            const handleSEL = (m) => { setUser(p => ({...p, mood: m})); setView('dash'); };

            if (view === 'login') return <LoginView onLogin={handleLogin} />;
            if (view === 'sel') return <SELOnboarding user={user} onComplete={handleSEL} />;

            return (
                <div className="flex h-screen bg-dark">
                    {/* 左側 Sidebar */}
                    <aside className="w-72 bg-panel border-r border-slate-800 flex flex-col p-6 z-20">
                        <div className="flex items-center gap-4 mb-10">
                            <div className="w-12 h-12 bg-gradient-to-tr from-blue-600 to-emerald-500 rounded-xl flex items-center justify-center font-black text-white shadow-lg">NK</div>
                            <div>
                                <div className="font-black text-white text-xl tracking-tight">AIOT SYS</div>
                                <div className="text-[10px] text-slate-500 font-bold tracking-widest mt-0.5">EDUCATION PRO</div>
                            </div>
                        </div>

                        <div className="p-5 bg-slate-900/50 rounded-2xl border border-slate-800 mb-8">
                            <div className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Student</div>
                            <div className="font-bold text-white text-lg">{user.name || 'Andrew'}</div>
                            <div className="flex items-center gap-2 mt-3 text-xs">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                <span className="text-emerald-400 font-mono">ONLINE</span>
                            </div>
                        </div>

                        <nav className="space-y-2 flex-1">
                            <button onClick={() => setModule(null)} className={`w-full p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${!module ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <Icon name="map" size={20}/> 城市地圖
                            </button>
                            <div className="pt-6 pb-2 pl-4 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Learning Modules</div>
                            <button onClick={() => setModule('iot')} className={`w-full p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${module==='iot' ? 'bg-slate-800 text-emerald-400 border border-emerald-900/50' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="wind" size={20}/> 綠色科技城
                            </button>
                            <button onClick={() => setModule('algo')} className={`w-full p-4 rounded-xl flex items-center gap-3 transition-all font-bold ${module==='algo' ? 'bg-slate-800 text-purple-400 border border-purple-900/50' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="brain" size={20}/> 數位素養城
                            </button>
                        </nav>

                        {/* HUD 監控模擬 */}
                        <div className="mt-auto bg-black/50 rounded-2xl p-4 border border-slate-800 relative overflow-hidden">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-red-500 rounded-full animate-pulse" />
                                    <span className="text-[10px] font-mono text-red-400">REC</span>
                                </div>
                                <span className="text-[10px] font-mono text-slate-500">FACE_ID</span>
                            </div>
                            <div className="space-y-2 font-mono text-xs">
                                <div className="text-slate-400 flex justify-between">Mood: <span className="text-emerald-400">{user.mood?.label || 'Calm'}</span></div>
                                <div className="text-slate-400 flex justify-between">Focus: <span className="text-blue-400">98%</span></div>
                            </div>
                            <div className="absolute top-0 left-0 w-full h-1 bg-emerald-500/20 shadow-[0_0_10px_rgba(16,185,129,0.5)] animate-[float_3s_linear_infinite]" />
                        </div>
                    </aside>

                    {/* 右側主畫面 */}
                    <main className="flex-1 relative overflow-hidden bg-dark">
                        {/* 科技感網格背景 */}
                        <div className="absolute inset-0 bg-[linear-gradient(to_right,#8080800a_1px,transparent_1px),linear-gradient(to_bottom,#8080800a_1px,transparent_1px)] bg-[size:32px_32px]"></div>
                        
                        <div className="relative z-10 w-full h-full overflow-y-auto">
                            {!module && <CityMap onSelect={setModule} />}
                            {module === 'iot' && <IoTLab />}
                            {module === 'algo' && <AlgoLab />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
